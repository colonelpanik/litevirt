<div class="bulk-result-dialog" style="border:1px solid var(--border);border-radius:6px;padding:1em;margin-top:1em;background:var(--bg-elev)">
  {{if .Error}}
    <h3 style="margin-top:0;color:var(--err)">Move failed</h3>
    <code style="word-break:break-all;font-size:12px">{{.Error}}</code>
  {{else}}
    <h3 style="margin-top:0;color:var(--ok)">Disk moved ✓</h3>
    <p>{{.VMName}} / {{.DiskName}} → pool <b>{{.Pool}}</b>{{if .Status}} — {{.Status}}{{end}}</p>
    {{if .Cleanup}}<p style="color:var(--muted);font-size:12px;margin-top:4px">Source disk: {{.Cleanup}}</p>{{end}}
    <button class="btn btn-primary" onclick="window.location.href='/vms/{{.VMName}}'">Refresh VM</button>
  {{end}}
</div>
